[build]
  command = "cd packages/server && npm install --omit=dev --ignore-scripts"
  functions = "packages/server/netlify/functions"
  publish = "netlify/static"

[build.environment]
  NODE_VERSION = "20"

# Route all requests to the Waline comment function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/comment/:splat"
  status = 200
  force = true